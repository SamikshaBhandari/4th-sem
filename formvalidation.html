<!doctype html>
<html>
  <head>
    <title>Registration Validation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 10px;
      }
      .error {
        color: red;
        font-size: 12px;
        display: block;
      }
      label {
        display: inline-block;
        width: 150px;
      }
    </style>
  </head>
  <body>
    <h2>User Registration</h2>
    <form id="regForm">
      <div class="form-group">
        <label>Email:</label> <input type="text" id="email" />
      </div>
      <div class="form-group">
        <label>Age (1-120):</label> <input type="number" id="age" />
      </div>
      <div class="form-group">
        <label>Password:</label> <input type="password" id="pw" />
      </div>
      <div class="form-group">
        <label>Confirm Password:</label> <input type="password" id="cpw" />
      </div>
      <div class="form-group">
        <label>Zip Code:</label>
        <input type="text" id="zip" placeholder="12345 or 12345-6789" />
      </div>
      <div class="form-group">
        <label>Website URL:</label> <input type="text" id="url" />
      </div>
      <div class="form-group">
        <label>Birth Date:</label> <input type="date" id="date" />
      </div>
      <div class="form-group">
        <label>Profile Pic (Max 2MB):</label> <input type="file" id="file" />
      </div>
      <div class="form-group">
        <label>Country:</label>
        <select id="country">
          <option value="">Select Country</option>
          <option value="NP">Nepal</option>
          <option value="US">USA</option>
        </select>
      </div>
      <div class="form-group">
        <input type="checkbox" id="terms" /> I agree to Terms & Conditions
      </div>

      <button type="submit">Register</button>
    </form>

    <script>
      document.getElementById("regForm").onsubmit = function (e) {
        e.preventDefault();
        let errors = [];

        // 1. Email Format
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(document.getElementById("email").value))
          errors.push("Invalid Email");

        // 2. Age (1-120)
        const age = parseInt(document.getElementById("age").value);
        if (isNaN(age) || age < 1 || age > 120)
          errors.push("Age must be 1-120");

        // 10. Password Strength
        const pw = document.getElementById("pw").value;
        const pwRegex =
          /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (!pwRegex.test(pw))
          errors.push(
            "Password: 8+ chars, Uppercase, Lowercase, Number, Special Char",
          );

        // 3. Password Match
        if (pw !== document.getElementById("cpw").value)
          errors.push("Passwords do not match");

        // 4. Zip Code
        const zipRegex = /^\d{5}(-\d{4})?$/;
        if (!zipRegex.test(document.getElementById("zip").value))
          errors.push("Invalid Zip Code");

        // 6. URL
        const urlRegex =
          /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
        if (!urlRegex.test(document.getElementById("url").value))
          errors.push("Invalid URL");

        // 7. Date (Not in future)
        const inputDate = new Date(document.getElementById("date").value);
        if (inputDate > new Date()) errors.push("Date cannot be in the future");

        // 8. File Size (Max 2MB)
        const file = document.getElementById("file").files[0];
        if (file && file.size > 2 * 1024 * 1024)
          errors.push("File size exceeds 2MB");

        // 9. Country Selection
        if (document.getElementById("country").value === "")
          errors.push("Please select a country");

        // 5. Terms Checkbox
        if (!document.getElementById("terms").checked)
          errors.push("Accept Terms & Conditions");

        // Final Result
        if (errors.length > 0) alert(errors.join("\n"));
        else alert("Registration Successful!");
      };
    </script>
  </body>
</html>
